stages:
  - test

ruff-check:
  stage: test
  image: alpine:latest
  before_script:
    - apk add --no-cache python3 py3-pip
    - pip install --break-system-packages ruff
  script:
    - echo "Running ruff check..."
    - ruff --version
    - ruff check .
    - echo "Ruff check completed successfully!"
