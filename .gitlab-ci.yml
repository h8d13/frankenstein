stages:
  - test

ruff-check:
  stage: test
  image: alpine:latest
  before_script:
    - apk add --no-cache ruff --repository=http://dl-cdn.alpinelinux.org/alpine/edge/community
  script:
    - echo "Running ruff check..."
    - ruff --version
    - ruff check .
    - echo "Ruff check completed successfully!"
